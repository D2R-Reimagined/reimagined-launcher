name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore ReimaginedLauncher.sln -p:Configuration=Production -r win-x64

      - name: Build solution
        run: dotnet build ReimaginedLauncher.sln --configuration Production --no-restore

      - name: Publish production bundle
        run: >
          dotnet publish ReimaginedLauncher/ReimaginedLauncher.csproj
          --configuration Production
          --no-build
          -r win-x64
          --output "${{ github.workspace }}\artifacts\ReimaginedLauncher"

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ github.workspace }}\artifacts\ReimaginedLauncher\*" `
            -DestinationPath "${{ github.workspace }}\artifacts\ReimaginedLauncher-win-x64.zip" `
            -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReimaginedLauncher-win-x64
          path: ${{ github.workspace }}\artifacts\ReimaginedLauncher-win-x64.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}\artifacts\ReimaginedLauncher-win-x64.zip

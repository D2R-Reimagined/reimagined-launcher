name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release_version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $version = '${{ github.event.inputs.version }}'.Trim()
          } else {
            $version = '${{ github.ref_name }}'.Trim()
          }

          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid version format: $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Update project version
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $projectFile = 'ReimaginedLauncher/ReimaginedLauncher.csproj'
          $version = '${{ steps.release_version.outputs.version }}'
          $content = Get-Content -Path $projectFile -Raw

          if ($content -notmatch '<Version>[^<]+</Version>') {
            throw "Unable to find <Version> in $projectFile"
          }

          $updated = [regex]::Replace($content, '<Version>[^<]+</Version>', "<Version>$version</Version>", 1)
          Set-Content -Path $projectFile -Value $updated

      - name: Resolve Velopack version
        id: velopack_version
        shell: pwsh
        run: |
          $projectFile = 'ReimaginedLauncher/ReimaginedLauncher.csproj'
          $content = Get-Content -Path $projectFile -Raw

          if ($content -notmatch '<VelopackVersion>([^<]+)</VelopackVersion>') {
            throw "Unable to find <VelopackVersion> in $projectFile"
          }

          $velopackVersion = $Matches[1].Trim()

          "version=$velopackVersion" >> $env:GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore solution
        run: dotnet restore ReimaginedLauncher.sln -p:Configuration=Production -r win-x64

      - name: Build solution
        run: dotnet build ReimaginedLauncher.sln --configuration Production --no-restore

      - name: Publish production bundle
        run: >
          dotnet publish ReimaginedLauncher/ReimaginedLauncher.csproj
          --configuration Production
          --no-build
          -r win-x64
          --output "${{ github.workspace }}\artifacts\ReimaginedLauncher"

      - name: Download previous Velopack releases
        continue-on-error: true
        shell: pwsh
        run: |
          dnx --yes vpk --version "${{ steps.velopack_version.outputs.version }}" download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --outputDir "${{ github.workspace }}\artifacts\velopack"

      - name: Package Velopack release
        shell: pwsh
        run: |
          dnx --yes vpk --version "${{ steps.velopack_version.outputs.version }}" pack `
            --packId "D2RReimagined.ReimaginedLauncher" `
            --packVersion "${{ steps.release_version.outputs.version }}" `
            --packDir "${{ github.workspace }}\artifacts\ReimaginedLauncher" `
            --mainExe "ReimaginedLauncher.exe" `
            --packTitle "D2R Reimagined Launcher" `
            --packAuthors "D2R Reimagined" `
            --icon "ReimaginedLauncher/Assets/ReimaginedLauncher.ico" `
            --runtime "win-x64" `
            --outputDir "${{ github.workspace }}\artifacts\velopack"

      - name: Commit version update
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ReimaginedLauncher/ReimaginedLauncher.csproj

          if (git diff --cached --quiet) {
            Write-Host "Project version already matches ${{ steps.release_version.outputs.version }}"
            exit 0
          }

          git commit -m "Release ${{ steps.release_version.outputs.tag }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create release tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $tag = '${{ steps.release_version.outputs.tag }}'

          git show-ref --verify --quiet "refs/tags/$tag"
          if ($LASTEXITCODE -eq 0) {
            throw "Tag $tag already exists"
          }

          git tag $tag
          git push origin $tag

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "${{ github.workspace }}\artifacts\ReimaginedLauncher\*" `
            -DestinationPath "${{ github.workspace }}\artifacts\ReimaginedLauncher-${{ steps.release_version.outputs.tag }}-win-x64.zip" `
            -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ReimaginedLauncher-${{ steps.release_version.outputs.tag }}-win-x64
          path: ${{ github.workspace }}\artifacts\ReimaginedLauncher

      - name: Upload Velopack artifact
        uses: actions/upload-artifact@v7
        with:
          name: ReimaginedLauncher-${{ steps.release_version.outputs.tag }}-velopack
          path: ${{ github.workspace }}\artifacts\velopack

      - name: Upload Velopack release assets
        shell: pwsh
        run: |
          $arguments = @(
            '--yes',
            'vpk',
            '--version', '${{ steps.velopack_version.outputs.version }}',
            'upload', 'github',
            '--outputDir', '${{ github.workspace }}\artifacts\velopack',
            '--repoUrl', 'https://github.com/${{ github.repository }}',
            '--token', '${{ secrets.GITHUB_TOKEN }}',
            '--publish',
            '--merge',
            '--releaseName', '${{ steps.release_version.outputs.tag }}',
            '--tag', '${{ steps.release_version.outputs.tag }}'
          )

          & dnx @arguments

      - name: Upload zip to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          name: ${{ steps.release_version.outputs.tag }}
          overwrite_files: true
          files: ${{ github.workspace }}\artifacts\ReimaginedLauncher-${{ steps.release_version.outputs.tag }}-win-x64.zip
